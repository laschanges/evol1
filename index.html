<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>evol - 소개팅 앱</title>
  <style>
    body {
      font-family: 'Segoe UI', 'Apple SD Gothic Neo', Arial, sans-serif;
      margin: 0;
      background: linear-gradient(135deg, #ffe0ec 0%, #f9f6ff 100%);
      color: #222;
    }
    .hero {
      text-align: center;
      padding: 64px 16px 32px 16px;
      background: linear-gradient(135deg, #ffb6d5 0%, #f9f6ff 100%);
    }
    .hero h1 {
      font-size: 2.8rem;
      margin-bottom: 12px;
      letter-spacing: -2px;
    }
    .hero p {
      font-size: 1.2rem;
      margin-bottom: 32px;
      color: #555;
    }
    .cta-btn {
      background: #ff4f8b;
      color: #fff;
      border: none;
      border-radius: 32px;
      padding: 16px 40px;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(255,79,139,0.12);
      transition: background 0.2s;
    }
    .cta-btn:hover {
      background: #e13c74;
    }
    .features {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 32px;
      margin: 48px 0 32px 0;
    }
    .feature {
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      padding: 28px 24px;
      max-width: 260px;
      min-width: 200px;
      text-align: center;
    }
    .feature h3 {
      margin: 0 0 10px 0;
      color: #ff4f8b;
      font-size: 1.2rem;
    }
    .feature p {
      margin: 0;
      color: #444;
      font-size: 1rem;
    }
    .mockup {
      display: flex;
      justify-content: center;
      margin: 32px 0 48px 0;
    }
    .mockup-card {
      background: #fff;
      border-radius: 24px;
      box-shadow: 0 4px 24px rgba(255,79,139,0.10);
      width: 320px;
      padding: 32px 24px;
      text-align: center;
      margin: 0 12px;
    }
    .mockup-card h2 {
      color: #ff4f8b;
      margin-bottom: 8px;
    }
    .mockup-card p {
      color: #555;
      margin-bottom: 0;
    }
    .profiles-section {
      max-width: 900px;
      margin: 0 auto 48px auto;
      padding: 0 16px;
      display: none;
      flex-direction: column;
      align-items: center;
      animation: fadeIn 0.7s;
    }
    .profiles-title {
      font-size: 1.5rem;
      margin: 32px 0 16px 0;
      color: #ff4f8b;
      font-weight: bold;
    }
    .profiles {
      display: flex;
      flex-wrap: wrap;
      gap: 32px;
      justify-content: center;
      margin-bottom: 24px;
    }
    .profile-card {
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      width: 180px;
      padding: 20px 12px 16px 12px;
      text-align: center;
      transition: transform 0.15s;
    }
    .profile-card:hover {
      transform: translateY(-6px) scale(1.04);
      box-shadow: 0 8px 24px rgba(255,79,139,0.13);
    }
    .profile-img {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 12px;
      border: 3px solid #ffb6d5;
    }
    .profile-name {
      font-weight: bold;
      font-size: 1.1rem;
      margin-bottom: 4px;
    }
    .profile-desc {
      color: #666;
      font-size: 0.97rem;
      margin-bottom: 0;
    }
    @media (max-width: 700px) {
      .features { flex-direction: column; gap: 18px; }
      .mockup { flex-direction: column; }
      .mockup-card { margin: 12px 0; }
      .profiles { flex-direction: column; gap: 18px; }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: none; }
    }
  </style>
</head>
<body>
  <div class="hero">
    <h1>evol - 새로운 만남의 시작</h1>
    <p>AI 기반 매칭으로 진짜 인연을 만나는 소개팅 앱, evol에서 설레는 첫 만남을 시작하세요.</p>
    <button class="cta-btn" id="tryFreeBtn">무료로 이용해보기</button>
  </div>

  <div class="features">
    <div class="feature">
      <h3>실시간 AI 매칭</h3>
      <p>AI가 내 취향을 분석해 가장 잘 맞는 상대를 추천해줘요.</p>
    </div>
    <div class="feature">
      <h3>안전한 인증 시스템</h3>
      <p>철저한 인증으로 안심하고 만남을 시작할 수 있어요.</p>
    </div>
    <div class="feature">
      <h3>감각적인 프로필 카드</h3>
      <p>나만의 개성을 살린 프로필로 매력을 어필해보세요.</p>
    </div>
  </div>

  <div class="mockup">
    <div class="mockup-card">
      <h2>evol</h2>
      <p>진짜 인연을 만나는 가장 스마트한 방법</p>
    </div>
  </div>

  <div class="profiles-section" id="profilesSection">
    <div class="profiles-title">추천 프로필</div>
    <div class="profiles" id="profilesContainer"></div>
  </div>

  <script>
    const maleProfiles = [
      { name: '민준', age: 29, desc: 'IT 스타트업 개발자, 커피와 산책을 좋아해요.', img: 'https://randomuser.me/api/portraits/men/32.jpg' },
      { name: '지훈', age: 31, desc: '여행과 사진, 새로운 경험을 즐깁니다.', img: 'https://randomuser.me/api/portraits/men/45.jpg' },
      { name: '현우', age: 27, desc: '운동과 음악, 긍정적인 에너지 가득!', img: 'https://randomuser.me/api/portraits/men/76.jpg' },
      { name: '도윤', age: 30, desc: '책과 영화, 대화하는 걸 좋아해요.', img: 'https://randomuser.me/api/portraits/men/85.jpg' },
      { name: '서준', age: 28, desc: '요리와 드라이브, 새로운 맛집 탐방러.', img: 'https://randomuser.me/api/portraits/men/23.jpg' },
      { name: '시우', age: 26, desc: '반려동물과 산책, 자연을 사랑해요.', img: 'https://randomuser.me/api/portraits/men/54.jpg' }
    ];
    const femaleProfiles = [
      { name: '서연', age: 27, desc: '디자인 전공, 감각적인 취미를 즐겨요.', img: 'https://randomuser.me/api/portraits/women/65.jpg' },
      { name: '지아', age: 28, desc: '여행과 맛집, 새로운 친구를 좋아해요.', img: 'https://randomuser.me/api/portraits/women/12.jpg' },
      { name: '하은', age: 26, desc: '음악과 미술, 감성적인 대화를 좋아해요.', img: 'https://randomuser.me/api/portraits/women/34.jpg' },
      { name: '수빈', age: 29, desc: '운동과 독서, 자기계발에 관심 많아요.', img: 'https://randomuser.me/api/portraits/women/41.jpg' },
      { name: '예린', age: 30, desc: '영화와 산책, 소소한 일상을 즐깁니다.', img: 'https://randomuser.me/api/portraits/women/22.jpg' },
      { name: '다은', age: 27, desc: '카페 탐방, 사진 찍기, 새로운 경험을 좋아해요.', img: 'https://randomuser.me/api/portraits/women/53.jpg' }
    ];

    function getRandomProfiles(arr, n) {
      const shuffled = arr.slice().sort(() => 0.5 - Math.random());
      return shuffled.slice(0, n);
    }

    function renderProfiles() {
      const males = getRandomProfiles(maleProfiles, 3);
      const females = getRandomProfiles(femaleProfiles, 3);
      const container = document.getElementById('profilesContainer');
      container.innerHTML = '';
      [...males, ...females].forEach(profile => {
        const card = document.createElement('div');
        card.className = 'profile-card';
        card.innerHTML = `
          <img class="profile-img" src="${profile.img}" alt="${profile.name}">
          <div class="profile-name">${profile.name} (${profile.age})</div>
          <div class="profile-desc">${profile.desc}</div>
        `;
        container.appendChild(card);
      });
    }

    document.getElementById('tryFreeBtn').addEventListener('click', function() {
      renderProfiles();
      const section = document.getElementById('profilesSection');
      section.style.display = 'flex';
      section.scrollIntoView({ behavior: 'smooth' });
    });
  </script>
</body>
</html>
